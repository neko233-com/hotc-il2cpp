name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Test
        run: |
          docker compose build
          docker compose run build-test
      
      - name: Verify
        run: |
          echo "All tests passed!"

  test-release:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Release
        run: |
          docker build --build-arg BUILD_TYPE=Release -t hotc-test .
          
      - name: Run Tests
        run: docker run hotc-test ctest --output-on-failure
