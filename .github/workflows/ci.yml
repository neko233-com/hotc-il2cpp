name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test (Linux x64)
        run: |
          docker compose build
          docker compose run build-test
      - name: Run Benchmarks
        run: docker compose run shell ./build/benchmarks/hotc-benchmarks
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: linux-results
          path: |
            docs/benchmarks.html
            benchmarks/results.json

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test (Windows x64)
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -G "Visual Studio 17 2022" -A x64 -DHOTC_BUILD_TESTS=ON -DHOTC_BUILD_BENCHMARKS=ON
          cmake --build . --config Release
          ctest -C Release --output-on-failure
        shell: cmd

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test (macOS ARM64)
        run: |
          mkdir build-macos
          cd build-macos
          cmake .. -DCMAKE_BUILD_TYPE=Release -DHOTC_BUILD_TESTS=ON -DHOTC_BUILD_BENCHMARKS=ON
          cmake --build . -j$(sysctl -n hw.ncpu)
          ctest --output-on-failure

  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
      - name: Build (Android ARM64)
        run: |
          mkdir build-android
          cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DHOTC_BUILD_TESTS=OFF \
            -DHOTC_BUILD_BENCHMARKS=OFF
          cmake --build . -j$(nproc)

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (iOS ARM64)
        run: |
          mkdir build-ios
          cd build-ios
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DHOTC_BUILD_TESTS=OFF \
            -DHOTC_BUILD_BENCHMARKS=OFF
          cmake --build . -j$(sysctl -n hw.ncpu)

  build-webgl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Build (WebGL)
        run: |
          mkdir build-webgl
          cd build-webgl
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DHOTC_BUILD_TESTS=OFF \
            -DHOTC_BUILD_BENCHMARKS=OFF
          emmake make -j$(nproc)

  build-docs:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: linux-results
          path: docs
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
