name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DHOTC_BUILD_TESTS=ON -DHOTC_BUILD_BENCHMARKS=ON
          cmake --build . -j$(nproc)
          ctest --output-on-failure || true
      - name: Run Benchmarks
        run: |
          cd build/benchmarks && ./hotc-benchmarks || true
      - name: Generate Docs
        run: |
          cp docs/index.html docs/index.html.bak
          cp docs/benchmarks.html docs/benchmarks.html.bak
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: linux-results
          path: |
            docs/
            benchmarks/results.json

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -G "Visual Studio 17 2022" -A x64 -DHOTC_BUILD_TESTS=ON -DHOTC_BUILD_BENCHMARKS=ON
          cmake --build . --config Release
        shell: cmd

  build-docs:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: linux-results
          path: docs
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
