name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Test
        run: |
          docker compose build
          docker compose run build-test
      
      - name: Verify
        run: |
          echo "All tests passed!"

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build ${{ matrix.build_type }}
        run: |
          docker build \
            --build-arg BUILD_TYPE=${{ matrix.build_type }} \
            -t hotc-test-${{ matrix.build_type }} .
          
      - name: Run Tests
        run: docker run hotc-test-${{ matrix.build_type }} ctest --output-on-failure
