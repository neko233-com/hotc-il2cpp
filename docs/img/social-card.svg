<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1234;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="96" font-weight="bold" fill="url(#accentGrad)">
    hotc-il2cpp
  </text>
  
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#8892b0">
    High-Performance IL2CPP Interpreter for Unity
  </text>
  
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#58a6ff">
    Surpassing HybridCLR Pro
  </text>
  
  <g stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.3">
    <circle cx="600" cy="300" r="200"/>
    <circle cx="600" cy="300" r="250"/>
  </g>
</svg>
