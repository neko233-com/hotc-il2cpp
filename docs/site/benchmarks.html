<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hotc-il2cpp Performance Benchmarks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { color: #58a6ff; margin-bottom: 2rem; font-size: 2.5rem; }
        .loading { text-align: center; padding: 4rem; }
        .spinner { border: 4px solid #30363d; border-top: 4px solid #58a6ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .note { color: #8b949e; margin-top: 1rem; }
        a { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>hotc-il2cpp Performance Benchmarks</h1>
        <div class="loading">
            <div class="spinner"></div>
            <p>Benchmarks will be available after CI runs.</p>
            <p class="note">Push to main branch to trigger benchmark generation.</p>
        </div>
    </div>
</body>
</html>
